# Spring Boot Developer Configuration (application-dev.yml)
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:greenco_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Logging settings for developers (verbose debugging)
logging:
  level:
    root: INFO
    com.greenco: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
