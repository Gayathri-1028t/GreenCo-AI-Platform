# Spring Boot Production Configuration (application-prod.yml)
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate # Strictly validate schema in production. Do not update or drop!
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

# SMTP Mail Server Production Configuration
  mail:
    host: ${SMTP_HOST:smtp.sendgrid.net}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Logging settings for production (Errors and warnings only, file storage rollover)
logging:
  level:
    root: WARN
    com.greenco: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: ERROR
  file:
    name: /var/log/greenco/greenco-platform-prod.log
